<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel - Application Status</title>
<style>
body { font-family: Arial; padding: 30px; max-width: 700px; margin: auto; }
input, select, button { padding: 10px; width: 100%; margin: 10px 0; }
h1, h2 { text-align: center; }
#updateResult { font-weight: bold; margin-top: 10px; text-align: center; }
table { width: 100%; border-collapse: collapse; margin-top: 20px; }
th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
th { background-color: #f0f0f0; }
</style>
</head>
<body>
<h1>Admin Panel: Application Status</h1>

<input type="email" id="adminEmail" placeholder="User Email to update">
<select id="newStatus">
<option value="Pending">Pending</option>
<option value="CV Received">CV Received</option>
<option value="Manager Review">Manager Review</option>
<option value="Approved">Approved</option>
<option value="Interview">Interview</option>
<option value="Test">Test</option>
<option value="Rejected">Rejected</option>
<option value="Offer Letter">Offer Letter</option>
<option value="Visa Processing">Visa Processing</option>
</select>
<button onclick="updateStatus()">Update Status</button>
<p id="updateResult"></p>

<h2>All Users</h2>
<table id="usersTable">
<thead>
<tr><th>Email</th><th>Status</th><th>Last Updated</th></tr>
</thead>
<tbody></tbody>
</table>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabaseUrl = 'https://teobesndfqwifdhwwjcn.supabase.co';
const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRlb2Jlc25kZnF3aWZkaHd3amNuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3NTc4MzQsImV4cCI6MjA4ODMzMzgzNH0.j0565xbspJ7z53JpgBY45HSa785RyYEsYPawy7D7dno';

const supabase = createClient(supabaseUrl, supabaseKey)

async function updateStatus() {
    const email = document.getElementById('adminEmail').value.trim()
    const status = document.getElementById('newStatus').value
    if(!email) return alert("Please enter user email")

    const { data, error } = await supabase
        .from('applications')
        .update({ status })
        .eq('email', email)

    const result = document.getElementById('updateResult')
    if(error) {
        result.innerText = "Error updating status"
        result.style.color = "red"
        console.log(error)
    } else if(data.length === 0) {
        result.innerText = "Email not found"
        result.style.color = "red"
    } else {
        result.innerText = "Status updated successfully!"
        result.style.color = "green"
        loadUsersTable()
    }
}

async function loadUsersTable() {
    const { data } = await supabase
        .from('applications')
        .select('email, status, updated_at, created_at')
        .order('updated_at', { ascending: false })

    const tbody = document.querySelector('#usersTable tbody')
    tbody.innerHTML = ""

    if(data) {
        data.forEach(row => {
            const tr = document.createElement('tr')
            const lastUpdated = row.updated_at || row.created_at
            tr.innerHTML = `<td>${row.email}</td><td>${row.status}</td><td>${new Date(lastUpdated).toLocaleString()}</td>`
            tbody.appendChild(tr)
        })
    }
}

// Initial load
loadUsersTable()
</script>
</body>
</html>
