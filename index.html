<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Application Status Tracker with History</title>
<style>
body { font-family: Arial; padding: 30px; max-width: 700px; margin: auto; }
input, select, button { padding: 10px; width: 100%; margin: 10px 0; }
h1, h2 { text-align: center; }
#statusResult, #updateResult { font-weight: bold; margin-top: 10px; text-align: center; }
table { width: 100%; border-collapse: collapse; margin-top: 20px; }
th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
th { background-color: #f0f0f0; }
.admin { margin-top: 50px; border-top: 1px solid #ccc; padding-top: 20px; }
</style>
</head>
<body>
<h1>Application Status Tracker</h1>

<!-- User Section -->
<input type="email" id="email" placeholder="Enter your Email">
<button onclick="checkStatus()">Check Status</button>
<p id="statusResult"></p>
<h3>Status History</h3>
<table id="historyTable">
<thead>
<tr><th>Status</th><th>Updated At</th></tr>
</thead>
<tbody></tbody>
</table>

<!-- Admin Section -->
<div class="admin">
<h2>Admin Panel: Update Status</h2>
<input type="email" id="adminEmail" placeholder="User Email to update">
<select id="newStatus">
<option value="Pending">Pending</option>
<option value="CV Received">CV Received</option>
<option value="Manager Review">Manager Review</option>
<option value="Approved">Approved</option>
<option value="Interview">Interview</option>
<option value="Test">Test</option>
<option value="Rejected">Rejected</option>
<option value="Offer Letter">Offer Letter</option>
<option value="Visa Processing">Visa Processing</option>
</select>
<button onclick="updateStatus()">Update Status</button>
<p id="updateResult"></p>

<h3>All Users</h3>
<table id="usersTable">
<thead>
<tr><th>Email</th><th>Status</th><th>Last Updated</th></tr>
</thead>
<tbody></tbody>
</table>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

// ✅ Supabase URL & Key
const supabaseUrl = 'https://teobesndfqwifdhwwjcn.supabase.co';
const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRlb2Jlc25kZnF3aWZkaHd3amNuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3NTc4MzQsImV4cCI6MjA4ODMzMzgzNH0.j0565xbspJ7z53JpgBY45HSa785RyYEsYPawy7D7dno';
const supabase = createClient(supabaseUrl, supabaseKey)

// User: Check Status
async function checkStatus() {
    const email = document.getElementById('email').value.trim()
    if(!email) return alert("Please enter your email")

    // Get current status
    const { data: userData, error: userError } = await supabase
        .from('applications')
        .select('status, created_at')
        .eq('email', email)
        .single()

    const result = document.getElementById('statusResult')
    const tbody = document.querySelector('#historyTable tbody')
    tbody.innerHTML = ""

    if(userError || !userData) {
        result.innerText = "Email not found"
        result.style.color = "red"
        return
    }

    result.innerText = "Current Status: " + userData.status
    result.style.color = "green"

    // Get history
    const { data: historyData, error: historyError } = await supabase
        .from('status_history')
        .select('status, updated_at')
        .eq('email', email)
        .order('updated_at', { ascending: false })

    if(!historyError && historyData) {
        historyData.forEach(row => {
            const tr = document.createElement('tr')
            tr.innerHTML = `<td>${row.status}</td><td>${new Date(row.updated_at).toLocaleString()}</td>`
            tbody.appendChild(tr)
        })
    }
}

// Admin: Update Status
async function updateStatus() {
    const email = document.getElementById('adminEmail').value.trim()
    const status = document.getElementById('newStatus').value
    if(!email) return alert("Please enter user email")

    const { data, error } = await supabase
        .from('applications')
        .update({ status })
        .eq('email', email)

    const result = document.getElementById('updateResult')
    if(error) {
        result.innerText = "Error updating status"
        result.style.color = "red"
        console.log(error)
    } else if(data.length === 0) {
        result.innerText = "Email not found"
        result.style.color = "red"
    } else {
        result.innerText = "Status updated successfully!"
        result.style.color = "green"
        loadUsersTable()
    }
}

// Load all users for admin table
async function loadUsersTable() {
    const { data, error } = await supabase
        .from('applications')
        .select('email, status, created_at')
        .order('created_at', { ascending: false })

    const tbody = document.querySelector('#usersTable tbody')
    tbody.innerHTML = ""

    if(!error && data) {
        data.forEach(row => {
            const tr = document.createElement('tr')
            tr.innerHTML = `<td>${row.email}</td><td>${row.status}</td><td>${new Date(row.created_at).toLocaleString()}</td>`
            tbody.appendChild(tr)
        })
    }
}

// Initial load
loadUsersTable()
</script>
</body>
</html>
