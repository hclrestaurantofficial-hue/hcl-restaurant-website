<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Application Status Tracker</title>

<style>
body{
font-family:Arial;
background:#f4f6f9;
text-align:center;
padding:40px;
}

.container{
background:white;
max-width:500px;
margin:auto;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
width:90%;
padding:12px;
margin-top:15px;
border:1px solid #ccc;
border-radius:5px;
}

button{
padding:12px 20px;
margin-top:15px;
border:none;
background:#007bff;
color:white;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

#result{
margin-top:20px;
font-size:18px;
font-weight:bold;
}
</style>

</head>

<body>

<div class="container">

<h2>Application Status Tracker</h2>

<p>Enter your email to check application status</p>

<input type="email" id="email" placeholder="Enter your email">

<br>

<button onclick="checkStatus()">Check Status</button>

<p id="result"></p>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxzQ7XEtsAJg-i2-C5gsJFENDbL1xRTvxzYvSzbbUL8bdAdh_j3mgvpq_RvHtbtuV2A/exec";

async function checkStatus(){

const email=document.getElementById("email").value.trim();

if(!email){
alert("Please enter your email");
return;
}

document.getElementById("result").innerText="Checking...";

try{

const response=await fetch(API_URL + "?email=" + email);

const data=await response.json();

if(data.error){

document.getElementById("result").style.color="red";
document.getElementById("result").innerText="Email not found";

}else{

document.getElementById("result").style.color="green";
document.getElementById("result").innerText=
"Status: " + data.status + " | Last Updated: " + data.lastUpdated;

}

}catch(err){

document.getElementById("result").innerText="Server Error";

}

}

</script>

</body>
</html>
