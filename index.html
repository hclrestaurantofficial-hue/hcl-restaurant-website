<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Application Status Tracker</title>
<style>
body { font-family: Arial; padding: 30px; max-width: 700px; margin: auto; }
input, button { padding: 10px; width: 100%; margin: 10px 0; }
h1, h2 { text-align: center; }
#statusResult { font-weight: bold; margin-top: 10px; text-align: center; }
table { width: 100%; border-collapse: collapse; margin-top: 20px; }
th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
th { background-color: #f0f0f0; }
</style>
</head>
<body>
<h1>Application Status Tracker</h1>

<input type="email" id="email" placeholder="Enter your Email">
<button onclick="checkStatus()">Check Status</button>
<p id="statusResult"></p>

<h3>Status History</h3>
<table id="historyTable">
<thead>
<tr><th>Status</th><th>Updated At</th></tr>
</thead>
<tbody></tbody>
</table>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabaseUrl = 'https://teobesndfqwifdhwwjcn.supabase.co';
const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRlb2Jlc25kZnF3aWZkaHd3amNuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3NTc4MzQsImV4cCI6MjA4ODMzMzgzNH0.j0565xbspJ7z53JpgBY45HSa785RyYEsYPawy7D7dno';

const supabase = createClient(supabaseUrl, supabaseKey)

async function checkStatus() {
    const email = document.getElementById('email').value.trim()
    if(!email) return alert("Please enter your email")

    const { data: userData, error: userError } = await supabase
        .from('applications')
        .select('status, created_at')
        .eq('email', email)
        .single()

    const result = document.getElementById('statusResult')
    const tbody = document.querySelector('#historyTable tbody')
    tbody.innerHTML = ""

    if(userError || !userData) {
        result.innerText = "Email not found"
        result.style.color = "red"
        return
    }

    result.innerText = "Current Status: " + userData.status
    result.style.color = "green"

    const { data: historyData } = await supabase
        .from('status_history')
        .select('status, updated_at')
        .eq('email', email)
        .order('updated_at', { ascending: false })

    if(historyData) {
        historyData.forEach(row => {
            const tr = document.createElement('tr')
            tr.innerHTML = `<td>${row.status}</td><td>${new Date(row.updated_at).toLocaleString()}</td>`
            tbody.appendChild(tr)
        })
    }
}
</script>
</body>
</html>
