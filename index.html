<!DOCTYPE html>
<html>
<head>
<title>HCl Restaurant Job Application</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial;
background-image:url("https://images.unsplash.com/photo-1554118811-1e0d58224f24");
background-size:cover;
background-position:center;
background-attachment:fixed;
}

.overlay{
background:rgba(0,0,0,0.6);
min-height:100vh;
padding:20px;
}

.container{
max-width:700px;
margin:auto;
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 0 15px black;
}

.step{display:none;}
.step.active{display:block;}

input,select,textarea{
width:100%;
padding:8px;
margin:6px 0;
}

button{
padding:10px;
background:#28a745;
color:white;
border:none;
cursor:pointer;
border-radius:5px;
}

button:hover{background:#218838;}

.navigation{
display:flex;
justify-content:space-between;
margin-top:20px;
}

h3{
background:#eee;
padding:6px;
}

</style>
</head>
<body>

<div class="overlay">

<div class="container">

<h2 style="text-align:center;">HCl Restaurant Job Application</h2>

<form action="https://formspree.io/f/xykdozek" method="POST">

<!-- STEP 1 -->
<div class="step active">
<h3>Step 1 - Personal Info</h3>

<input type="text" name="fullname" placeholder="Full Name" required>
<input type="email" name="email" placeholder="Email" required>
<input type="tel" name="phone" placeholder="Phone" required>

<h4>Gender</h4>
<input type="radio" name="gender" value="Male" required> Male
<input type="radio" name="gender" value="Female"> Female
<input type="radio" name="gender" value="Other"> Other

<h4>Marital Status</h4>
<select name="marital_status" required>
<option value="">Select</option>
<option>Single</option>
<option>Married</option>
<option>Divorced</option>
<option>Other</option>
</select>

<textarea name="home_address" placeholder="Home Address" required></textarea>

<h4>Nationality</h4>
<select name="nationality" required>
<option value="">Select</option>
<option>🇵🇰 Pakistan</option>
<option>🇮🇳 India</option>
<option>🇻🇳 Vietnam</option>
<option>🇨🇳 China</option>
<option>🇵🇭 Philippines</option>
<option>🇮🇩 Indonesia</option>
<option>🇧🇩 Bangladesh</option>
<option>🇦🇱 Albania</option>
<option>🇷🇺 Russia</option>
<option>🇰🇿 Kazakhstan</option>
<option>🇹🇯 Tajikistan</option>
<option>🇹🇼 Taiwan</option>
<option>Other</option>
</select>

</div>

<!-- STEP 2 -->
<div class="step">
<h3>Step 2 - Education & Work</h3>

<label><input type="checkbox" id="noEdu"> I have No Education</label>
<input type="text" id="institution" name="institution" placeholder="School / College">
<input type="date" id="eduStart" name="education_start">
<input type="date" id="eduEnd" name="education_end">

<br><br>

<label><input type="checkbox" id="noWork"> I have No Work Experience</label>
<input type="text" id="company" name="company" placeholder="Company Name">
<input type="date" id="workStart" name="work_start">
<input type="date" id="workEnd" name="work_end">

</div>

<!-- STEP 3 -->
<div class="step">
<h3>Step 3 - Job & Passport</h3>

<select name="position" id="jobPosition" required>
<option value="">Select Position</option>
<option>Assistant Chef</option>
<option>Waiter</option>
<option>Kitchen Helper</option>
<option>Cleaner</option>
<option>Cashier</option>
<option>Delivery Staff</option>
<option>Office Worker</option>
<option>Computer Operator</option>
</select>

<input type="text" id="jobLocation" name="job_location" readonly placeholder="Auto Location">

<input type="text" name="passport_number" placeholder="Passport Number" required>

<label>Passport Issue</label>
<input type="date" id="issueDate" name="passport_issue" required>

<label>Passport Expiry</label>
<input type="date" id="expiryDate" name="passport_expiry" required>

<input type="text" name="national_id" placeholder="National ID" required>
<input type="number" name="salary" placeholder="Salary Expectation" required>

</div>

<!-- STEP 4 -->
<div class="step">
<h3>Step 4 - Final</h3>

<p>
📩 Please send your CV to:<br>
<strong>hclrestaurantofficial@gmail.com</strong>
</p>

<label>
<input type="checkbox" required>
I confirm all information is correct
</label>

<br><br>
<button type="submit">Submit Application</button>

</div>

</form>

<div class="navigation">
<button onclick="prevStep()" type="button">Previous</button>
<button onclick="nextStep()" type="button">Next</button>
</div>

</div>
</div>

<script>

/* STEP SYSTEM */

let currentStep=0;
const steps=document.querySelectorAll(".step");

function showStep(i){
steps.forEach(s=>s.classList.remove("active"));
steps[i].classList.add("active");
}

function validateStep(){
let inputs=steps[currentStep].querySelectorAll("input,select,textarea");
for(let i=0;i<inputs.length;i++){
if(inputs[i].required && !inputs[i].value){
alert("Please fill required fields");
return false;
}
}
return true;
}

function nextStep(){
if(validateStep()){
if(currentStep<steps.length-1){
currentStep++;
showStep(currentStep);
}
}
}

function prevStep(){
if(currentStep>0){
currentStep--;
showStep(currentStep);
}
}

/* AUTO LOCATION */

document.getElementById("jobPosition").addEventListener("change",function(){

let jobs=["Assistant Chef","Waiter","Kitchen Helper","Cleaner","Cashier","Delivery Staff"];

if(jobs.includes(this.value)){
document.getElementById("jobLocation").value="Via di Panico, 53 Rome Italy";
}
else if(this.value==="Office Worker"||this.value==="Computer Operator"){
document.getElementById("jobLocation").value="Office Department - Via di Panico, 53 Rome Italy";
}
else{
document.getElementById("jobLocation").value="";
}

});

/* EDUCATION AUTO DISABLE */

document.getElementById("noEdu").addEventListener("change",function(){
institution.disabled=this.checked;
eduStart.disabled=this.checked;
eduEnd.disabled=this.checked;
});

/* WORK AUTO DISABLE */

document.getElementById("noWork").addEventListener("change",function(){
company.disabled=this.checked;
workStart.disabled=this.checked;
workEnd.disabled=this.checked;
});

/* PASSPORT VALIDATION */

const issue=document.getElementById("issueDate");
const expiry=document.getElementById("expiryDate");

issue.addEventListener("change",function(){
expiry.min=this.value;
});

expiry.addEventListener("change",function(){
if(this.value<issue.value){
alert("Expiry cannot be before issue!");
this.value="";
}
});

</script>

</body>
  </html>
